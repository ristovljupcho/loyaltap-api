spring.datasource.url=${NEON_DATABASE_URL}
spring.datasource.username=${NEON_DATABASE_USERNAME}
spring.datasource.password=${NEON_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=LoyalTapNeonHikariPool
spring.datasource.hikari.maximum-pool-size=${NEON_HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${NEON_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.connection-timeout=${NEON_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.validation-timeout=${NEON_HIKARI_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.idle-timeout=${NEON_HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${NEON_HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.keepalive-time=${NEON_HIKARI_KEEPALIVE_TIME:300000}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.liquibase.url=${NEON_MIGRATION_DATABASE_URL:${spring.datasource.url}}
spring.liquibase.user=${NEON_MIGRATION_DATABASE_USERNAME:${spring.datasource.username}}
spring.liquibase.password=${NEON_MIGRATION_DATABASE_PASSWORD:${spring.datasource.password}}
