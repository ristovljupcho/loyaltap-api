databaseChangeLog:
  - changeSet:
      id: 001-create-businesses
      author: codex
      changes:
        - createTable:
            tableName: businesses
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_businesses
                    nullable: false
              - column:
                  name: name
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(2000)
              - column:
                  name: phone
                  type: varchar(50)
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: website_url
                  type: varchar(2048)
              - column:
                  name: address_line1
                  type: varchar(255)
              - column:
                  name: address_line2
                  type: varchar(255)
              - column:
                  name: city
                  type: varchar(120)
              - column:
                  name: state
                  type: varchar(120)
              - column:
                  name: postal_code
                  type: varchar(40)
              - column:
                  name: country
                  type: varchar(120)
              - column:
                  name: status
                  type: varchar(32)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: businesses
            columnNames: slug
            constraintName: uk_businesses_slug
        - createIndex:
            tableName: businesses
            indexName: idx_businesses_status
            columns:
              - column:
                  name: status
        - sql:
            dbms: postgresql,h2
            sql: ALTER TABLE businesses ADD CONSTRAINT chk_businesses_status CHECK (status IN ('ACTIVE', 'INACTIVE'))
